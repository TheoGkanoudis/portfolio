<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>portfolio</title>
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl/dist/maplibre-gl.css" />
  <style>
    html:not([data-loaded]) body {
      visibility: hidden;

      & #map-container {
        opacity: 0;
      }
    }

    body {
      background: hsl(215 5 var(--lightness, 50));
    }

    #loader {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: grid;
      place-items: center;
      visibility: visible;
      transition: opacity 0.5s ease;
      background: hsl(215 14% 90%);

      & .spinner {
        width: 2.5rem;
        height: 2.5rem;
        border-radius: 50%;
        animation: loader-spin 0.8s linear infinite;
        border: 3px solid rgba(0, 0, 0, 0.2);
        border-top-color: rgba(0, 0, 0, 0.85);
        transition: scale 0.5s ease-in, opacity 0.5s ease;
      }
    }

    @media (prefers-color-scheme: dark) {
      #loader {
        background: hsl(215 14% 10%);

        & .spinner {
          border: 3px solid rgba(255, 255, 255, 0.2);
          border-top-color: rgba(255, 255, 255, 0.85);
        }


      }
    }

    @keyframes loader-spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script type="module" src="/src/main.ts"></script>
</head>

<body>
  <div id="loader">
    <div class="spinner"></div>
  </div>
  <div id="map-container">
    <div id="map"></div>
    <div id="parallax-clouds">
      <div id="map-clouds"></div>
    </div>
    <div id="night-overlay"></div>
    <div id="sunset-overlay"></div>
    <div id="map-lights"></div>
    <div id="cloud-blur"></div>
    <div id="blur"></div>
  </div>
  <div id="content">
    <section id="welcome">
      <div class="card">
        <h1>Welcome</h1>
        <h3>This is Theo</h3>
      </div>
    </section>
  </div>
</body>

</html>
